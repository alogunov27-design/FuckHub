<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - FuckHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #ddd; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-black border-b-4 border-orange-500 p-5">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black">← FuckHub</a>
            <span class="text-orange-400 font-bold">Профиль</span>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-10">
        <div class="bg-zinc-900 rounded-3xl p-10">
            <h1 class="text-5xl font-bold text-orange-400 mb-8">Профиль</h1>
            
            <div class="mb-12 p-6 bg-zinc-800 rounded-2xl">
                <p class="text-xl"><strong>Никнейм:</strong> <span id="profile-username"></span></p>
                <p class="text-xl"><strong>Email:</strong> <span id="profile-email"></span></p>
            </div>

            <button onclick="showPublishModal()" class="w-full bg-orange-500 hover:bg-orange-600 text-black font-black text-2xl py-6 rounded-2xl mb-12">
                + Опубликовать новую игру
            </button>

            <h2 class="text-3xl font-bold mb-6 text-orange-400">Мои игры</h2>
            <div id="my-games-list" class="space-y-6"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="publish-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-orange-500 rounded-3xl w-full max-w-2xl p-10">
            <h2 class="text-4xl font-bold text-orange-400 mb-8 text-center">Публикация игры</h2>
            
            <input id="game-title" placeholder="Название игры" class="w-full p-5 bg-zinc-800 rounded-2xl text-lg mb-4">
            <input id="game-cover" placeholder="Ссылка на обложку" class="w-full p-5 bg-zinc-800 rounded-2xl text-lg mb-4">
            <textarea id="game-desc" placeholder="Описание" class="w-full p-5 bg-zinc-800 rounded-2xl h-32 mb-6"></textarea>
            
            <div class="mb-6">
                <p class="mb-3">Платформы:</p>
                <div class="flex gap-3">
                    <button onclick="togglePlatform(this)" data-platform="PC" class="px-6 py-3 bg-zinc-800 rounded-xl">PC</button>
                    <button onclick="togglePlatform(this)" data-platform="Android" class="px-6 py-3 bg-zinc-800 rounded-xl">Android</button>
                    <button onclick="togglePlatform(this)" data-platform="iOS" class="px-6 py-3 bg-zinc-800 rounded-xl">iOS</button>
                </div>
            </div>
            
            <input id="game-download" placeholder="Ссылка на скачивание" class="w-full p-5 bg-zinc-800 rounded-2xl text-lg mb-8">
            
            <div class="flex gap-4">
                <button onclick="publishGame()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-black font-bold py-5 rounded-2xl">Опубликовать</button>
                <button onclick="hidePublishModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-5 rounded-2xl">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        
        let supabaseClient;
        let currentUser = null;
        let selectedPlatforms = [];

        async function init() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = "index.html";

            currentUser = session.user;
            document.getElementById('profile-username').textContent = currentUser.user_metadata?.username || currentUser.email;
            document.getElementById('profile-email').textContent = currentUser.email;

            loadMyGames();
        }

        function togglePlatform(btn) {
            btn.classList.toggle('active');
            const p = btn.dataset.platform;
            selectedPlatforms.includes(p) ? selectedPlatforms = selectedPlatforms.filter(x => x !== p) : selectedPlatforms.push(p);
        }

        function showPublishModal() {
            document.getElementById('publish-modal').classList.remove('hidden');
            selectedPlatforms = [];
        }

        function hidePublishModal() {
            document.getElementById('publish-modal').classList.add('hidden');
        }

        async function publishGame() {
            const title = document.getElementById('game-title').value.trim();
            if (!title) return alert("Название обязательно");

            try {
                const { error } = await supabaseClient.from('games').insert({
                    title: title,
                    cover: document.getElementById('game-cover').value,
                    description: document.getElementById('game-desc').value,
                    platforms: selectedPlatforms.join(', '),
                    download: document.getElementById('game-download').value,
                    author: 'FuckHub',
                    user_id: currentUser.id
                });

                if (error) throw error;

                alert("✅ Игра опубликована!");
                hidePublishModal();
                loadMyGames();
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }

        async function loadMyGames() {
            const { data, error } = await supabaseClient
                .from('games')
                .select('*')
                .eq('user_id', currentUser.id);

            const container = document.getElementById('my-games-list');
            if (!data || data.length === 0) {
                container.innerHTML = `<p class="text-gray-400">Пока нет игр</p>`;
                return;
            }

            container.innerHTML = data.map(g => `
                <div class="bg-zinc-800 rounded-3xl p-6">
                    <h3 class="text-2xl font-bold">${g.title}</h3>
                    <p class="text-orange-400">Автор: FuckHub</p>
                    <a href="${g.download}" target="_blank" class="block mt-6 bg-orange-500 text-black font-bold py-4 text-center rounded-2xl">Скачать</a>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
