<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра • FuckHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f1117] text-[#c5d1e0]">

    <nav class="bg-[#0f1117] border-b border-[#1f2533] px-8 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold">
                ← FUCK<span class="text-orange-500">HUB</span>
            </a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-8 py-10" id="game-page">
        <!-- Контент игры загружается сюда -->
    </div>

    <script>
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadGamePage() {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('id');

            if (!gameId) {
                document.getElementById('game-page').innerHTML = `<p class="text-red-400">Игра не найдена</p>`;
                return;
            }

            // Загружаем игру
            const { data: game } = await supabase.from('games').select('*').eq('id', gameId).single();
            if (!game) return;

            // Загружаем комментарии
            const { data: comments } = await supabase
                .from('comments')
                .select('*, profiles:user_id (username)')
                .eq('game_id', gameId)
                .order('created_at', { ascending: true });

            let commentsHTML = '';
            if (comments && comments.length > 0) {
                commentsHTML = comments.map(c => `
                    <div class="bg-[#1a1f2e] p-4 rounded-xl mb-3">
                        <div class="flex justify-between mb-1">
                            <span class="font-medium">${c.profiles?.username || 'Пользователь'}</span>
                            <span class="text-xs text-zinc-400">${new Date(c.created_at).toLocaleDateString('ru-RU')}</span>
                        </div>
                        <p class="text-sm">${c.content}</p>
                    </div>
                `).join('');
            } else {
                commentsHTML = `<p class="text-zinc-400 text-sm">Комментариев пока нет. Будь первым!</p>`;
            }

            document.getElementById('game-page').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <img src="${game.cover || 'https://picsum.photos/800/450'}" class="w-full rounded-2xl mb-6" alt="${game.title}">
                        
                        <h1 class="text-4xl font-bold mb-2">${game.title}</h1>
                        <p class="text-zinc-400 mb-6">от ${game.author} • ${new Date(game.created_at).toLocaleDateString('ru-RU')}</p>

                        <div class="mb-8">
                            <h3 class="font-semibold mb-3">Описание</h3>
                            <p class="text-zinc-300">${game.description || 'Описание отсутствует.'}</p>
                        </div>

                        <!-- Скриншоты -->
                        <div class="mb-10">
                            <h3 class="font-semibold mb-4">Скриншоты и арты</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                ${(game.screenshots && game.screenshots.length > 0) 
                                    ? game.screenshots.map(url => `<img src="${url}" class="rounded-xl w-full aspect-video object-cover">`).join('')
                                    : `<div class="col-span-3 text-zinc-400 text-sm">Скриншоты пока не добавлены</div>`
                                }
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="bg-[#1a1f2e] rounded-2xl p-6 mb-6">
                            <button onclick="window.open('${game.download}', '_blank')" 
                                    class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl mb-4">
                                Скачать игру
                            </button>
                        </div>

                        <!-- Комментарии -->
                        <div class="bg-[#1a1f2e] rounded-2xl p-6">
                            <h3 class="font-semibold mb-4">Обсуждение (${comments ? comments.length : 0})</h3>
                            
                            <div class="max-h-80 overflow-y-auto mb-4 pr-2">
                                ${commentsHTML}
                            </div>

                            <!-- Форма комментария -->
                            <div class="mt-4">
                                <textarea id="comment-text" placeholder="Напиши комментарий..." 
                                          class="w-full p-3 bg-[#11141c] border border-[#2a3344] rounded-xl text-sm h-24 resize-none"></textarea>
                                <button onclick="postComment('${gameId}')" 
                                        class="mt-2 w-full bg-white text-black font-semibold py-2.5 rounded-xl text-sm hover:bg-zinc-200">
                                    Отправить
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function postComment(gameId) {
            const text = document.getElementById('comment-text').value.trim();
            if (!text) return alert("Комментарий не может быть пустым");

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Сначала войдите в аккаунт");

            const { error } = await supabase.from('comments').insert({
                game_id: gameId,
                user_id: user.id,
                content: text
            });

            if (error) {
                alert("Ошибка при отправке комментария");
            } else {
                document.getElementById('comment-text').value = '';
                loadGamePage(); // перезагружаем комментарии
            }
        }

        window.onload = loadGamePage;
    </script>
</body>
</html>
