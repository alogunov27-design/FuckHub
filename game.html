<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщество • FuckHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f1117; color: #c5d1e0; font-family: system-ui, sans-serif; }
    </style>
</head>
<body>
    <nav class="bg-[#0f1117] border-b border-[#1f2533] px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold">
                ← <span>FUCK</span><span class="text-orange-500">HUB</span>
            </a>
            <span class="font-semibold text-orange-500">Сообщество</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-8 py-10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">Сообщество</h1>
                <p class="text-zinc-400">Арты, скриншоты, видео и обсуждения</p>
            </div>
            <button onclick="showUploadModal()" class="bg-orange-500 hover:bg-orange-600 text-black font-semibold px-6 py-3 rounded-2xl">
                + Выложить контент
            </button>
        </div>

        <div id="posts-container" class="space-y-8"></div>
    </div>

    <!-- Модал загрузки -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-[#1a1f2e] border border-[#2a3344] rounded-3xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-semibold mb-6">Выложить контент</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">К какой игре?</label>
                    <select id="game-select" class="w-full px-4 py-3 bg-[#11141c] border border-[#2a3344] rounded-2xl"></select>
                </div>

                <div>
                    <label class="block text-sm text-zinc-400 mb-1">Тип контента</label>
                    <select id="content-type" class="w-full px-4 py-3 bg-[#11141c] border border-[#2a3344] rounded-2xl">
                        <option value="image">Изображение</option>
                        <option value="video">Видео</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-zinc-400 mb-1">Ссылка на контент</label>
                    <input id="media-url" type="text" placeholder="https://..." class="w-full px-4 py-3 bg-[#11141c] border border-[#2a3344] rounded-2xl">
                </div>

                <div>
                    <label class="block text-sm text-zinc-400 mb-1">Описание</label>
                    <textarea id="post-desc" class="w-full px-4 py-3 bg-[#11141c] border border-[#2a3344] rounded-2xl h-20"></textarea>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="uploadPost()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-black font-semibold py-3 rounded-2xl">Опубликовать</button>
                <button onclick="hideUploadModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let gamesList = [];

        const reactionsList = ['❤️', '👍', '🔥', '😂', '😮'];

        async function loadGamesForSelect() {
            const { data } = await supabaseClient.from('games').select('id, title');
            gamesList = data || [];
            const select = document.getElementById('game-select');
            select.innerHTML = '<option value="">Выбери игру...</option>';
            gamesList.forEach(game => {
                const option = document.createElement('option');
                option.value = game.id;
                option.textContent = game.title;
                select.appendChild(option);
            });
        }

        async function loadPosts() {
            const { data: posts } = await supabaseClient
                .from('community_posts')
                .select(`*, games (title)`)
                .order('created_at', { ascending: false });

            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            if (!posts || posts.length === 0) {
                container.innerHTML = `<p class="text-center py-12 text-zinc-500">Пока ничего не выложили</p>`;
                return;
            }

            for (const post of posts) {
                const gameTitle = post.games ? post.games.title : 'Неизвестная игра';
                const reactions = post.reactions || {};

                let mediaHTML = '';
                if (post.video_url) {
                    mediaHTML = `<video controls class="w-full aspect-video bg-black rounded-xl"><source src="${post.video_url}"></video>`;
                } else if (post.image_url) {
                    mediaHTML = `<img src="${post.image_url}" class="w-full aspect-video object-cover" onerror="this.src='https://picsum.photos/800/450'">`;
                }

                let reactionsHTML = reactionsList.map(emoji => {
                    const count = reactions[emoji] || 0;
                    return `<button onclick="addReaction('${post.id}', '${emoji}')" class="hover:scale-125 transition-transform text-2xl">${emoji} ${count > 0 ? `<span class="text-sm">${count}</span>` : ''}</button>`;
                }).join('');

                // Комментарии
                const { data: comments } = await supabaseClient
                    .from('post_comments')
                    .select('*')
                    .eq('post_id', post.id)
                    .order('created_at', { ascending: true });

                let commentsHTML = '';
                if (comments && comments.length > 0) {
                    commentsHTML = comments.map(c => `
                        <div class="text-sm border-t border-[#2a3344] pt-3 mt-3">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-semibold text-orange-400">${c.username || 'Аноним'}</span>
                            </div>
                            <p class="text-zinc-300">${c.content}</p>
                        </div>
                    `).join('');
                }

                const postDiv = document.createElement('div');
                postDiv.className = 'bg-[#1a1f2e] rounded-2xl border border-[#2a3344] overflow-hidden';
                postDiv.innerHTML = `
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-[#2a3344] text-xs px-3 py-1 rounded-full">${gameTitle}</span>
                            <span class="text-xs text-zinc-500">${new Date(post.created_at).toLocaleDateString('ru-RU')}</span>
                        </div>
                        
                        ${post.description ? `<p class="mb-4 text-zinc-200">${post.description}</p>` : ''}
                        
                        <div class="mb-4 rounded-xl overflow-hidden border border-[#2a3344]">
                            ${mediaHTML}
                        </div>

                        <!-- Реакции -->
                        <div class="flex gap-5 mb-6 text-2xl">
                            ${reactionsHTML}
                        </div>

                        <!-- Комментарии -->
                        <div class="mt-4">
                            <div class="text-sm font-medium mb-3">Комментарии (${comments ? comments.length : 0})</div>
                            <div class="space-y-4 mb-4">
                                ${commentsHTML || '<p class="text-xs text-zinc-500">Комментариев пока нет</p>'}
                            </div>

                            <div class="flex gap-2">
                                <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий..." 
                                       class="flex-1 px-4 py-2 bg-[#11141c] border border-[#2a3344] rounded-xl text-sm">
                                <button onclick="addComment('${post.id}')" 
                                        class="px-5 bg-orange-500 hover:bg-orange-600 text-black font-semibold rounded-xl text-sm">
                                    Отправить
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(postDiv);
            }
        }

        async function addReaction(postId, emoji) {
            const { data: post } = await supabaseClient.from('community_posts').select('reactions').eq('id', postId).single();
            const reactions = post.reactions || {};
            reactions[emoji] = (reactions[emoji] || 0) + 1;

            await supabaseClient.from('community_posts').update({ reactions }).eq('id', postId);
            loadPosts();
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();
            if (!content) return;

            const username = currentUser ? (currentUser.user_metadata?.username || currentUser.email.split('@')[0]) : 'Аноним';

            const { error } = await supabaseClient.from('post_comments').insert({
                post_id: postId,
                content: content,
                username: username,
                user_id: currentUser ? currentUser.id : null
            });

            if (error) {
                alert("Ошибка: " + error.message);
            } else {
                input.value = '';
                loadPosts();
            }
        }

        function showUploadModal() {
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function hideUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }

        async function uploadPost() {
            const gameId = document.getElementById('game-select').value;
            const type = document.getElementById('content-type').value;
            const mediaUrl = document.getElementById('media-url').value.trim();
            const description = document.getElementById('post-desc').value.trim();

            if (!gameId || !mediaUrl) {
                alert("Выбери игру и укажи ссылку");
                return;
            }

            const data = {
                game_id: gameId,
                description: description || null,
                user_id: currentUser?.id
            };

            if (type === 'image') data.image_url = mediaUrl;
            else data.video_url = mediaUrl;

            const { error } = await supabaseClient.from('community_posts').insert(data);

            if (error) alert("Ошибка: " + error.message);
            else {
                alert("Опубликовано!");
                hideUploadModal();
                loadPosts();
            }
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) currentUser = session.user;

            await loadGamesForSelect();
            await loadPosts();
        }

        window.onload = init;
    </script>
</body>
</html>
