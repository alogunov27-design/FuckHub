<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuckHub - FuckFaz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #ddd; }
        .game-card { transition: all 0.3s; }
        .game-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>

    <nav class="bg-black border-b-4 border-orange-500 p-5 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl font-black text-white">FUCK</span>
                <span class="text-4xl font-black text-orange-500">HUB</span>
            </div>
            <div class="flex gap-8 text-lg">
                <a href="#" class="hover:text-orange-400">Магазин</a>
                <a href="profile.html" class="hover:text-orange-400">Мои Игры</a>
            </div>

            <div id="auth-buttons" class="flex gap-3">
                <button onclick="showRegisterModal()" class="bg-orange-500 text-black px-6 py-2 font-bold hover:bg-orange-600">РЕГИСТРАЦИЯ</button>
                <button onclick="showLoginModal()" class="border border-orange-500 px-6 py-2 font-bold hover:bg-orange-500 hover:text-black">ВОЙТИ</button>
            </div>

            <div id="user-section" class="hidden items-center gap-4">
                <span id="username-display" class="text-orange-400 font-bold"></span>
                <a href="profile.html" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded">Профиль</a>
                <button onclick="logout()" class="text-red-400 hover:text-red-500">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="h-[65vh] flex items-center justify-center text-center" 
         style="background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://tankulestablitz-lab.github.io/fuckfaz-site.io/images/studio_logo.jpeg') center/cover;">
        <div>
            <h1 class="text-7xl font-black text-white mb-4">FUCKHUB</h1>
            <p class="text-3xl text-orange-400">От команды FuckFaz</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-8 py-8">
        <!-- Поиск -->
        <div class="mb-8">
            <input id="search-input" 
                   onkeyup="filterGames()"
                   placeholder="Поиск игр..." 
                   class="w-full p-5 bg-zinc-900 border border-zinc-700 rounded-3xl text-lg focus:outline-none focus:border-orange-500">
        </div>

        <!-- Игры от FuckHub -->
        <h2 class="text-3xl font-bold mb-6 text-orange-400">🎮 Игры от FuckHub</h2>
        <div id="fuckhub-games" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16"></div>

        <!-- Все игры -->
        <h2 class="text-3xl font-bold mb-6 text-orange-400">Все опубликованные игры</h2>
        <div id="all-games" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        
        let supabaseClient;
        let currentUser = null;
        let allGames = [];

        async function init() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('username-display').textContent = currentUser.user_metadata?.username || currentUser.email;
            }

            loadAllGames();
        }

        function loadAllGames() {
            allGames = JSON.parse(localStorage.getItem('myGames') || '[]');
            renderGames(allGames);
        }

        function renderGames(games) {
            // Игры от FuckHub
            const fuckhubContainer = document.getElementById('fuckhub-games');
            const fuckhubGames = games.filter(g => g.author && g.author.includes("FuckHub") || g.author === "FuckFaz");
            
            fuckhubContainer.innerHTML = fuckhubGames.length ? fuckhubGames.map(g => createGameCard(g)).join('') 
                : `<p class="col-span-3 text-center py-10 text-gray-400">Пока нет официальных игр от FuckHub</p>`;

            // Все игры
            const allContainer = document.getElementById('all-games');
            allContainer.innerHTML = games.length ? games.map(g => createGameCard(g)).join('') 
                : `<p class="col-span-3 text-center py-10 text-gray-400">Пока нет игр</p>`;
        }

        function createGameCard(g) {
            return `
                <div class="game-card bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${g.cover || 'https://picsum.photos/400/300'}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold">${g.title}</h3>
                        <p class="text-orange-400 text-sm">Автор: ${g.author || 'Неизвестно'}</p>
                        <p class="text-gray-400 mt-3 line-clamp-3">${g.desc || ''}</p>
                        <a href="${g.download}" target="_blank" 
                           class="mt-6 block text-center bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl">
                            Скачать
                        </a>
                    </div>
                </div>
            `;
        }

        function filterGames() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.title.toLowerCase().includes(query) || 
                (game.desc && game.desc.toLowerCase().includes(query)) ||
                (game.author && game.author.toLowerCase().includes(query))
            );
            renderGames(filtered);
        }

        function logout() { if(confirm("Выйти?")) location.reload(); }
        function showRegisterModal() { alert("Регистрация работает через кнопку 'ВОЙТИ'"); }
        function showLoginModal() { alert("Нажми 'ВОЙТИ' и введи данные"); }

        window.onload = init;
    </script>
</body>
</html>
