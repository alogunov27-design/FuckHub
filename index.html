<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuckHub - FuckFaz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #ddd; }
        .game-card { transition: all 0.3s; }
        .game-card:hover { transform: translateY(-10px); }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal.active {
            display: flex;
        }
    </style>
</head>
<body>

    <nav class="bg-black border-b-4 border-orange-500 p-5 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl font-black text-white">FUCK</span>
                <span class="text-4xl font-black text-orange-500">HUB</span>
            </div>
            <div class="flex gap-8 text-lg">
                <a href="#" class="hover:text-orange-400">Магазин</a>
                <a href="profile.html" class="hover:text-orange-400">Мои Игры</a>
            </div>

            <div id="auth-buttons" class="flex gap-3">
                <button onclick="showRegisterModal()" class="bg-orange-500 text-black px-6 py-2 font-bold hover:bg-orange-600">Регистрация</button>
                <button onclick="showLoginModal()" class="border border-orange-500 px-6 py-2 font-bold hover:bg-orange-500 hover:text-black">Войти</button>
            </div>

            <div id="user-section" class="hidden items-center gap-4">
                <span id="username-display" class="text-orange-400 font-bold"></span>
                <a href="profile.html" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded">Профиль</a>
                <button onclick="logout()" class="text-red-400 hover:text-red-500">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="h-[65vh] flex items-center justify-center text-center" 
         style="background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://tankulestablitz-lab.github.io/fuckfaz-site.io/images/studio_logo.jpeg') center/cover;">
        <div>
            <h1 class="text-7xl font-black text-white mb-4">FUCKHUB</h1>
            <p class="text-3xl text-orange-400">От команды FuckFaz</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-8 py-8">
        <input id="search-input" onkeyup="filterGames()" placeholder="🔍 Поиск игр..." class="w-full p-5 bg-zinc-900 border border-zinc-700 rounded-3xl text-lg mb-10 focus:outline-none focus:border-orange-500">

        <h2 class="text-3xl font-bold mb-6 text-orange-400">🎮 Игры от FuckHub</h2>
        <div id="fuckhub-games" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16"></div>

        <h2 class="text-3xl font-bold mb-6 text-orange-400">Все опубликованные игры</h2>
        <div id="all-games" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md relative">
            <button onclick="hideRegisterModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h2 class="text-3xl font-bold text-orange-400 mb-8 text-center">Регистрация</h2>
            <input id="reg-username" type="text" placeholder="Никнейм" class="w-full p-4 bg-zinc-800 rounded-2xl mb-4 text-white">
            <input id="reg-email" type="email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded-2xl mb-4 text-white">
            <input id="reg-password" type="password" placeholder="Пароль" class="w-full p-4 bg-zinc-800 rounded-2xl mb-6 text-white">
            <button onclick="registerUser()" class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl">Зарегистрироваться</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md relative">
            <button onclick="hideLoginModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h2 class="text-3xl font-bold text-orange-400 mb-8 text-center">Вход</h2>
            <input id="login-email" type="email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded-2xl mb-4 text-white">
            <input id="login-password" type="password" placeholder="Пароль" class="w-full p-4 bg-zinc-800 rounded-2xl mb-6 text-white">
            <button onclick="loginUser()" class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl">Войти</button>
        </div>
    </div>

    <script>
        // Проверяем, что Supabase загрузился
        console.log('Supabase loaded:', typeof window.supabase !== 'undefined');
        
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        
        let supabaseClient = null;
        let currentUser = null;

        // Функции для модальных окон
        function showRegisterModal() {
            console.log('showRegisterModal called');
            const modal = document.getElementById('register-modal');
            if (modal) {
                modal.classList.add('active');
                console.log('Register modal shown');
            } else {
                console.error('Register modal not found');
            }
        }

        function hideRegisterModal() {
            console.log('hideRegisterModal called');
            const modal = document.getElementById('register-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        function showLoginModal() {
            console.log('showLoginModal called');
            const modal = document.getElementById('login-modal');
            if (modal) {
                modal.classList.add('active');
                console.log('Login modal shown');
            } else {
                console.error('Login modal not found');
            }
        }

        function hideLoginModal() {
            console.log('hideLoginModal called');
            const modal = document.getElementById('login-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        // Инициализация Supabase
        function initSupabase() {
            try {
                if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('Supabase client created successfully');
                    return true;
                } else {
                    console.error('Supabase SDK not available');
                    return false;
                }
            } catch (error) {
                console.error('Error creating Supabase client:', error);
                return false;
            }
        }

        async function init() {
            console.log('Initializing app...');
            
            // Инициализируем Supabase
            if (!initSupabase()) {
                console.error('Failed to initialize Supabase');
                return;
            }

            try {
                // Проверяем сессию
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error) {
                    console.error('Session error:', error);
                }
                
                if (session) {
                    currentUser = session.user;
                    updateUI();
                    console.log('User logged in:', currentUser.email);
                } else {
                    console.log('No active session');
                }
                
                // Загружаем игры
                await loadGames();
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('username-display').textContent = currentUser.user_metadata?.username || currentUser.email;
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-section').classList.add('hidden');
            }
        }

        async function loadGames() {
            if (!supabaseClient) {
                console.error('Supabase client not initialized');
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('games')
                    .select('*')
                    .order('created_at', { ascending: false });
                    
                if (error) {
                    console.error('Error loading games:', error);
                    return;
                }
                
                renderGames(data || []);
            } catch (error) {
                console.error('Load games error:', error);
            }
        }

        function renderGames(games) {
            const fuckhubContainer = document.getElementById('fuckhub-games');
            const allContainer = document.getElementById('all-games');

            if (!fuckhubContainer || !allContainer) {
                console.error('Game containers not found');
                return;
            }

            const fuckhubGames = games.filter(g => g.author === 'FuckHub');
            fuckhubContainer.innerHTML = fuckhubGames.map(g => createCard(g)).join('') || 
                '<p class="col-span-3 text-center py-10 text-gray-400">Пока нет официальных игр от FuckHub</p>';

            const otherGames = games.filter(g => g.author !== 'FuckHub');
            allContainer.innerHTML = otherGames.map(g => createCard(g)).join('') || 
                '<p class="col-span-3 text-center py-10 text-gray-400">Пока нет других игр</p>';
        }

        function createCard(g) {
            return `
                <div class="game-card bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${g.cover || 'https://picsum.photos/400/300'}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold">${g.title || 'Без названия'}</h3>
                        <p class="text-orange-400 text-sm">Автор: ${g.author || 'Неизвестно'}</p>
                        <p class="text-gray-400 mt-3 line-clamp-3">${g.description || ''}</p>
                        <a href="${g.download || '#'}" target="_blank" class="mt-6 block text-center bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-2xl">Скачать</a>
                    </div>
                </div>
            `;
        }

        function filterGames() {
            loadGames();
        }

        async function registerUser() {
            if (!supabaseClient) {
                alert('Ошибка соединения с сервером. Попробуйте перезагрузить страницу.');
                return;
            }

            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !email || !password) {
                alert("Заполните все поля");
                return;
            }

            if (password.length < 6) {
                alert("Пароль должен быть минимум 6 символов");
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email, 
                    password,
                    options: { 
                        data: { username }
                    }
                });
                
                if (error) throw error;
                
                alert("✅ Регистрация прошла! Проверьте почту для подтверждения.");
                hideRegisterModal();
                
                // Очищаем поля
                document.getElementById('reg-username').value = '';
                document.getElementById('reg-email').value = '';
                document.getElementById('reg-password').value = '';
                
            } catch (error) {
                alert("Ошибка регистрации: " + error.message);
                console.error('Register error:', error);
            }
        }

        async function loginUser() {
            if (!supabaseClient) {
                alert('Ошибка соединения с сервером. Попробуйте перезагрузить страницу.');
                return;
            }

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                alert("Заполните email и пароль");
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ 
                    email, 
                    password 
                });
                
                if (error) throw error;
                
                alert("✅ Успешный вход!");
                hideLoginModal();
                
                // Обновляем состояние
                currentUser = data.user;
                updateUI();
                await loadGames();
                
                // Очищаем поля
                document.getElementById('login-email').value = '';
                document.getElementById('login-password').value = '';
                
            } catch (error) {
                alert("Ошибка входа: " + error.message);
                console.error('Login error:', error);
            }
        }

        async function logout() {
            if (!supabaseClient) return;
            try {
                await supabaseClient.auth.signOut();
                currentUser = null;
                updateUI();
                await loadGames();
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // Запускаем инициализацию после загрузки страницы
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Для отладки - делаем функции доступными глобально
        window.showRegisterModal = showRegisterModal;
        window.showLoginModal = showLoginModal;
        window.hideRegisterModal = hideRegisterModal;
        window.hideLoginModal = hideLoginModal;
        window.registerUser = registerUser;
        window.loginUser = loginUser;
        window.logout = logout;
        window.filterGames = filterGames;

        console.log('Script loaded');
    </script>
</body>
</html>
