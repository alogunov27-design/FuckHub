<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuckHub - FuckFaz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #ddd; }
    </style>
</head>
<body>

    <nav class="bg-black border-b-4 border-orange-500 p-5">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl font-black text-white">FUCK</span>
                <span class="text-4xl font-black text-orange-500">HUB</span>
            </div>
            <div>
                <button onclick="showRegisterModal()" class="bg-orange-500 text-black px-6 py-2 mr-3 font-bold">Регистрация</button>
                <button onclick="showLoginModal()" class="border border-orange-500 px-6 py-2 font-bold">Войти</button>
            </div>
        </div>
    </nav>

    <div class="h-[65vh] flex items-center justify-center text-center" 
         style="background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://tankulestablitz-lab.github.io/fuckfaz-site.io/images/studio_logo.jpeg') center/cover;">
        <div>
            <h1 class="text-7xl font-black text-white">FUCKHUB</h1>
            <p class="text-3xl text-orange-400">От команды FuckFaz</p>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-3xl font-bold text-orange-400 mb-8">Регистрация</h2>
            <input id="reg-username" placeholder="Никнейм" class="w-full p-4 bg-zinc-800 rounded mb-4">
            <input id="reg-email" type="email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded mb-4">
            <input id="reg-password" type="password" placeholder="Пароль" class="w-full p-4 bg-zinc-800 rounded mb-6">
            <button onclick="registerUser()" class="w-full bg-orange-500 text-black py-4 rounded font-bold">Зарегистрироваться</button>
            <button onclick="hideRegisterModal()" class="mt-4 text-gray-400">Отмена</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-3xl font-bold text-orange-400 mb-8">Вход</h2>
            <input id="login-email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded mb-4">
            <input id="login-password" type="password" placeholder="Пароль" class="w-full p-4 bg-zinc-800 rounded mb-6">
            <button onclick="loginUser()" class="w-full bg-orange-500 text-black py-4 rounded font-bold">Войти</button>
            <button onclick="hideLoginModal()" class="mt-4 text-gray-400">Отмена</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nuyeqiiopptdykxvurrk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6YKf0lc-mTAB0FdVhQQzcQ_DFttxToY';
        
        let supabaseClient;

        function init() {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        function showRegisterModal() {
            document.getElementById('register-modal').classList.remove('hidden');
        }
        function hideRegisterModal() {
            document.getElementById('register-modal').classList.add('hidden');
        }

        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
        }
        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }

        async function registerUser() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !email || !password) return alert("Заполните все поля");

            try {
                const { error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { username: username } }
                });
                if (error) throw error;
                alert("✅ Регистрация прошла! Проверь почту для подтверждения.");
                hideRegisterModal();
            } catch (e) {
                alert("Ошибка регистрации: " + e.message);
            }
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) return alert("Заполните email и пароль");

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                if (error) throw error;
                alert("✅ Успешный вход!");
                hideLoginModal();
                location.reload();
            } catch (e) {
                alert("Ошибка входа: " + e.message);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
